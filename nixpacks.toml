[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[variables]
# Tell Puppeteer to skip downloading its own Chrome bundle (~300MB).
# nixpacks already installs system chromium via apt in the setup phase.
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
