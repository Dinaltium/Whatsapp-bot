services:
  - type: web
    name: parag-whatsapp-bot
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ALLOW_FROM_ME_MESSAGES
        value: "true"
      - key: ADMIN_JIDS
        sync: false
      - key: AUTH_STATE_KEY
        sync: false
      - key: ALLOWED_GROUPS_FILE
        value: allowed-groups.json
      - key: ALLOWED_CHATS_FILE
        value: allowed-chats.json
